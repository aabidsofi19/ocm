apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  labels:
    app: catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: online-store/catalog:v2.3.1
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: SEARCH_SERVICE_ADDR
              value: "elasticsearch:9200"
            - name: CACHE_ENDPOINT
              value: "cache:6379"
            - name: IMAGE_CDN_URL
              value: "https://images.example.com"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
spec:
  type: ClusterIP
  selector:
    app: catalog
  ports:
    - port: 5000
      targetPort: 5000
