apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  labels:
    app: cart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: online-store/cart:v1.2.0
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: CACHE_ADDR
              value: "cache:6379"
            - name: DB_SERVICE_HOST
              value: "db"
            - name: DB_SERVICE_PORT
              value: "5432"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cart
spec:
  type: ClusterIP
  selector:
    app: cart
  ports:
    - port: 4000
      targetPort: 4000
