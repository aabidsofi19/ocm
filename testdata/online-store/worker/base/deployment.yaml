apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: online-store/worker:v1.1.0
          ports:
            - containerPort: 9090
              hostPort: 9090
              name: debug
          env:
            - name: QUEUE_ADDR
              value: "cache:6379"
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment:8080"
            - name: NOTIFICATION_WEBHOOK_URL
              value: "https://hooks.slack.com/services/T00000/B00000/XXXXXXX"
            - name: CATALOG_SERVICE_ADDR
              value: "catalog:5000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
