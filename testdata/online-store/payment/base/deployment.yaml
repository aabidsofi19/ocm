apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app: payment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: online-store/payment:v1.0.5
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_ADDR
              value: "db:5432"
            - name: STRIPE_API_URL
              value: "https://api.stripe.com/v1"
            - name: FRAUD_SERVICE_ENDPOINT
              value: "http://fraud.risk.svc.cluster.local:8080"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment
spec:
  type: ClusterIP
  selector:
    app: payment
  ports:
    - port: 8080
      targetPort: 8080
