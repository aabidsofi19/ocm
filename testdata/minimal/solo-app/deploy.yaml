apiVersion: apps/v1
kind: Deployment
metadata:
  name: solo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: solo-app
  template:
    metadata:
      labels:
        app: solo-app
    spec:
      containers:
        - name: app
          image: myorg/solo-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: solo-app
spec:
  type: ClusterIP
  selector:
    app: solo-app
  ports:
    - port: 8080
      targetPort: 8080
