apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  labels:
    app: alertmanager
spec:
  serviceName: alertmanager
  replicas: 3
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          ports:
            - containerPort: 9093
            - containerPort: 9094
              name: mesh
          env:
            - name: SLACK_WEBHOOK_URL
              value: "https://hooks.slack.com/services/T000/B000/XXXX"
            - name: PAGERDUTY_SERVICE_URL
              value: "https://events.pagerduty.com/v2/enqueue"
            - name: CLUSTER_PEER_ADDR
              value: "alertmanager:9094"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: alertmanager-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
    - name: mesh
      port: 9094
      targetPort: 9094
