apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  serviceName: prometheus
  replicas: 2
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          ports:
            - containerPort: 9090
          env:
            - name: ALERTMANAGER_URL
              value: "http://alertmanager:9093"
            - name: RETENTION_DAYS
              value: "15"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
        - name: config-reloader
          image: jimmidyson/configmap-reload:v0.9.0
          env:
            - name: RELOAD_URL
              value: "http://localhost:9090/-/reload"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        - name: thanos-sidecar
          image: quay.io/thanos/thanos:v0.34.0
          ports:
            - containerPort: 10901
              name: grpc
            - containerPort: 10902
              name: http
          env:
            - name: OBJSTORE_CONFIG_FILE
              value: "/etc/thanos/bucket.yaml"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: prometheus-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
    - name: grpc
      port: 10901
      targetPort: 10901
