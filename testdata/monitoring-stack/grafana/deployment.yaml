apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.example.com"
            - name: GF_DATABASE_HOST
              value: "db:5432"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://sso.example.com/oauth/authorize"
            - name: PROMETHEUS_ADDR
              value: "prometheus:9090"
            - name: ALERTMANAGER_ADDR
              value: "alertmanager:9093"
            - name: LOKI_URL
              value: "http://loki.logging.svc.cluster.local:3100"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
